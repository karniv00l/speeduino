name: Dump env

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Dump github context
        shell: bash
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "{
            \"name\": \"misra check\",
            \"head_sha\": $SHA,
            \"status\": \"completed\",
            \"conclusion\": \"failure\"
          }" > payload.json && \
          curl --url https://api.github.com/repos/$REPOSITORY/check-runs \
          -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "content-type: application/json" \
          -H "authorization: Bearer $GITHUB_TOKEN" \
          -d @payload.json \
          --fail \
          -v
