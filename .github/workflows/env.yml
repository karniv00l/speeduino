name: Dump env

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Dump github context
        shell: bash
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          REPOSITORY: ${{ github.repository }}
        run: 'echo "$(REPOSITORY)" && curl --request POST --url https://api.github.com/repos/$(REPOSITORY)/check-runs --header "Accept: application/vnd.github.v3+json" --header "content-type: application/json" --header "authorization: Bearer $(GITHUB_TOKEN)" --fail'
